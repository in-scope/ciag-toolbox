name: Bug report
description: Something in the app did not work the way you expected.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Plain language is fine; nothing here needs to be technical.

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: e.g. I expected the new viewport to show a normalized version of the image.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      placeholder: e.g. The new viewport opened but stayed blank.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: If you can, walk through what you did just before the bug. If you cannot reproduce it, leave this blank.
      placeholder: |
        1. Opened my-image.png
        2. Selected viewport 1
        3. Clicked Normalize, kept "Open in a new viewport" on, clicked Apply
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Not sure
    validations:
      required: false

  - type: textarea
    id: media
    attributes:
      label: Screenshots, recordings, or sample files
      description: Drag images or short screen recordings directly into this box. If a specific image triggered the bug and you can share it, attach it here too.
    validations:
      required: false
