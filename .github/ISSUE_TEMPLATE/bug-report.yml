name: Bug report
description: Something in the app did not work the way you expected.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. The more detail you can give, the easier it is for us to track down. Don't worry about being technical; plain language is fine.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what went wrong and what you expected to happen instead.
      placeholder: e.g. I clicked Normalize and applied it to a new viewport, but the new viewport stayed blank.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: If you can, walk through what you did just before the bug. If you cannot reproduce it, leave this blank.
      placeholder: |
        1. Opened my-image.png
        2. Selected viewport 1
        3. Clicked Normalize, kept "Open in a new viewport" on, clicked Apply
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Not sure
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      description: You can find this in Help > About.
      placeholder: e.g. 0.1.1
    validations:
      required: false

  - type: textarea
    id: media
    attributes:
      label: Screenshots, recordings, or sample files
      description: Drag images or short screen recordings directly into this box. If a specific image triggered the bug and you can share it, attach it here too.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Any other context that might help us understand or reproduce the issue.
    validations:
      required: false
