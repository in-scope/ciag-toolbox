name: Feature request
description: Suggest something the app should be able to do, or a way it should work better.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting this. Big or small ideas are both welcome. If you are not sure whether something is possible, suggest it anyway.

  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the task or workflow you have in mind, and what currently makes it hard or impossible.
      placeholder: e.g. I want to compare two normalized images side by side at exactly the same zoom level.
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: How do you imagine it working?
      description: A rough sketch of the behaviour you would like. Do not worry about implementation details.
      placeholder: e.g. A "link viewports" toggle that keeps two viewports' pan and zoom synchronised.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds you have tried
      description: Anything you currently do to get around the missing feature.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Any other context, references, or examples from other tools.
    validations:
      required: false
