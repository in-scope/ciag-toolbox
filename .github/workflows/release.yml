name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Git tag to upload installers to (e.g. v0.2.0).'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and upload installers for (e.g. v0.2.0).'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build Windows NSIS installer
        run: pnpm build:win

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*Setup.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS dmg (x64 + arm64)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build macOS dmg artifacts
        run: pnpm build:mac

      - name: Upload macOS dmg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmgs
          path: dist/*.dmg
          if-no-files-found: error

  publish-release:
    name: Upload installers to GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts

      - name: Download macOS dmg artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmgs
          path: artifacts

      - name: Ensure GitHub Release exists for tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes ""
          fi

      - name: Upload installers to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: gh release upload "$TAG" artifacts/* --clobber
