<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';"
    />
    <title>MSI Toolbox</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        color: #fafafa;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        -webkit-app-region: drag;
      }
      .card {
        position: absolute;
        inset: 0;
        background: #18181b;
        border: 1px solid #27272a;
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px;
        box-sizing: border-box;
        gap: 18px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .logo svg {
        width: 72px;
        height: 72px;
        color: #3b82f6;
      }
      .logo .wordmark {
        font-size: 56px;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #fafafa;
        line-height: 1;
      }
      .subtitle {
        font-size: 13px;
        color: #a1a1aa;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .loading {
        margin-top: 8px;
        font-size: 11px;
        color: #71717a;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .version {
        position: absolute;
        bottom: 14px;
        right: 18px;
        font-size: 11px;
        color: #71717a;
        font-family:
          "SFMono-Regular", "Consolas", "Liberation Mono", monospace;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"
          />
          <path
            d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"
          />
          <path
            d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"
          />
        </svg>
        <span class="wordmark">MSI</span>
      </div>
      <div class="subtitle">Toolbox</div>
      <div class="loading">Starting&hellip;</div>
      <div class="version" id="version"></div>
    </div>
    <script>
      (function renderVersionFromUrlHash() {
        var raw = window.location.hash.replace(/^#/, "");
        if (!raw) return;
        var version = decodeURIComponent(raw);
        document.getElementById("version").textContent = "v" + version;
      })();
    </script>
  </body>
</html>
